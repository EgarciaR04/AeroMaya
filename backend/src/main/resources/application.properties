spring.application.name=aeromaya

# Base de datos — valores vienen del .env en la raiz del proyecto
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Consola H2 (solo activa si se usa H2)
spring.h2.console.enabled=${H2_CONSOLE:true}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:}
